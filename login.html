<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | LearnExpress</title>
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body class="login-page">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <svg width="42" height="42" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="logoGradient" x1="14" y1="14" x2="86" y2="86" gradientUnits="userSpaceOnUse">
              <stop stop-color="#ff7a1a" />
              <stop offset="1" stop-color="#ffbb4c" />
            </linearGradient>
          </defs>
          <rect x="10" y="10" width="80" height="80" rx="24" fill="url(#logoGradient)" />
          <path d="M34 34C38 28 46 28 52 34C58 40 58 50 52 56L40 68C38 70 34 70 32 68C30 66 30 62 32 60L42 50C44 48 44 44 42 42C38 38 34 38 34 34Z" fill="#ffffff" />
          <path d="M60 34H70C72 34 74 36 74 38V70C74 72 72 74 70 74H60C58 74 56 72 56 70V38C56 36 58 34 60 34Z" fill="#ffffff" />
        </svg>
        <span>LearnExpress</span>
      </a>
      <nav class="main-nav">
        <!-- Dynamically populated by script.js -->
        <a href="index.html">Home</a>
        <a href="courses.html">Courses</a>
        <a href="login.html">Sign In</a>
        <a href="register.html">Sign Up</a>
      </nav>
      <button class="nav-toggle" aria-label="Open navigation">Menu</button>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-panel">
      <h1>Sign in to LearnExpress</h1>
      <p>Enter your email and password to continue to the learning experience.</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="name@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Enter your password" required style="width: 100%;" />
            <button type="button" class="btn-toggle-password" aria-label="Show password" data-target="password">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-eye"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <div class="form-group checkbox-group" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
          <div style="display: flex; align-items: center; gap: 0.5rem;">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember" style="margin: 0;">Remember me</label>
          </div>
          <a href="forgot-password.html" class="forgot-link" style="font-size: 0.9rem; color: var(--primary); text-decoration: none; font-weight: 600;">Forgot password?</a>
        </div>
        <div id="loginError" class="form-error" style="display:none;"></div>
        <div id="loginSuccess" class="form-success" style="display:none;"></div>
        <div class="auth-actions">
          <button type="submit">Sign In</button>
          <a href="register.html" class="auth-link">New here? Sign up</a>
        </div>
        <div class="auth-divider"><span>or sign in with</span></div>
        <div class="social-login">
          <button type="button" class="btn btn-social btn-google">
            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.16v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.16C1.43 8.55 1 10.22 1 12s.43 3.45 1.16 4.93l3.68-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.16 7.07l3.68 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button type="button" class="btn btn-social btn-github">
            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
            GitHub
          </button>
        </div>
      </form>
    </section>
  </main>

  <script src="script.js?v=3"></script>
</body>
</html>

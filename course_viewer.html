<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Viewer | LearnExpress</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --viewer-sidebar-width: 320px;
    }

    body.viewer-mode {
      overflow: hidden;
      background: #f8f9fa;
    }

    .viewer-layout {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Sidebar */
    .viewer-sidebar {
      width: var(--viewer-sidebar-width);
      background: #fff;
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      z-index: 10;
      box-shadow: 4px 0 15px rgba(0,0,0,0.03);
    }

    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .sidebar-header h2 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: var(--text-main);
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
    }

    .lesson-item {
      padding: 1rem 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
    }

    .lesson-item:hover {
      background: rgba(0,0,0,0.02);
    }

    .lesson-item.active {
      background: var(--glass-bg);
      border-left-color: var(--primary);
    }

    .lesson-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .lesson-item.active .lesson-icon {
      background: var(--primary);
      color: #fff;
    }

    .lesson-info {
      flex: 1;
    }

    .lesson-title {
      font-weight: 600;
      font-size: 0.9rem;
      display: block;
      color: var(--text-main);
    }

    .lesson-type {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    /* Main Content */
    .viewer-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fbfbfc;
      overflow-y: auto;
    }

    .viewer-navbar {
      height: 64px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      border-bottom: 1px solid var(--glass-border);
      position: sticky;
      top: 0;
      z-index: 9;
    }

    .content-area {
      flex: 1;
      padding: 3rem;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    .video-container {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 2rem;
    }

    .video-container iframe,
    .video-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .text-content-card {
      background: #fff;
      padding: 2.5rem;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      line-height: 1.8;
      font-size: 1.05rem;
      color: #444;
    }

    .text-content-card h1, .text-content-card h2 {
      margin-top: 0;
      color: var(--text-main);
    }

    .resource-card {
      background: linear-gradient(135deg, #fff 0%, #f0f4f8 100%);
      padding: 2rem;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      border: 1px solid var(--glass-border);
    }

    .live-card {
      background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
      color: #fff;
      padding: 3rem;
      border-radius: 24px;
      text-align: center;
    }

    .live-status {
      display: inline-block;
      padding: 0.4rem 1rem;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }

    .viewer-footer {
      padding: 2rem;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--glass-border);
      background: #fff;
    }

    @media (max-width: 900px) {
      .viewer-sidebar {
        display: none; /* In full implementation, we'd add a toggle */
      }
      .content-area {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body class="viewer-mode">
  <div class="viewer-layout" id="viewerLayout">
    <!-- Sidebar -->
    <aside class="viewer-sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" style="text-decoration:none; color:var(--primary); font-size:0.8rem; font-weight:700; display:block; margin-bottom:1rem;">&larr; BACK TO DASHBOARD</a>
        <h2 id="viewerCourseTitle">Loading Course...</h2>
        <div id="courseProgressBar" style="width:100%; height:4px; background:#eee; border-radius:2px; overflow:hidden;">
          <div id="courseProgressFill" style="width:0%; height:100%; background:var(--primary); transition: width 0.3s ease;"></div>
        </div>
      </div>
      <div class="sidebar-content" id="lessonList">
        <!-- Lessons will be injected here -->
      </div>
    </aside>

    <!-- Main Content -->
    <main class="viewer-main">
      <nav class="viewer-navbar">
        <div class="brand" style="font-weight:800; font-size:1.2rem; color:var(--primary);">LearnExpress Player</div>
        <div id="currentLessonTypeBadge" class="badge-type" style="padding:0.4rem 0.8rem; font-size:0.7rem; border-radius:8px;">LECTURE</div>
      </nav>

      <div class="content-area" id="mainViewerArea">
          <!-- Active lesson content will be injected here -->
          <div style="text-align:center; padding: 10rem 0;">
            <p class="dim-text">Select a lesson from the sidebar to begin.</p>
          </div>
      </div>

      <div class="viewer-footer">
        <button class="btn btn-secondary" id="btnPrev">Previous</button>
        <button class="btn btn-primary" id="btnNext">Next Lesson</button>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
  <script>
    // Specific initialization for viewer
    document.addEventListener('DOMContentLoaded', () => {
      app.initCourseViewer();
    });
  </script>
</body>
</html>
